name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  build-test-publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    env:
      CONFIGURATION: Release
      ARTIFACT: Api.zip
      DATA_ARTIFACT: election-data.zip
      BINARY_CHECKSUM_ARTIFACT: Api.zip.sha256
      DATA_CHECKSUM_ARTIFACT: election-data.zip.sha256
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Lavinia-api.sln

      - name: Build
        run: dotnet build Lavinia-api.sln --configuration $CONFIGURATION --no-restore

      - name: Test
        run: dotnet test Lavinia-api.sln --configuration $CONFIGURATION --no-build --verbosity minimal

      - name: Publish API
        run: dotnet publish Api/Api.csproj --configuration $CONFIGURATION --no-build --output published

      - name: Zip Artifact
        run: (cd published && zip -r ../$ARTIFACT .)

      - name: Export static election data
        run: |
          mkdir -p election-data
          dotnet run --project Api/Api.csproj --configuration $CONFIGURATION --no-build -- --export-static ./election-data

      - name: Build data manifest
        env:
          DATA_VERSION: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          CHECKSUMS_JSON=$(
            cd election-data
            sha256sum years.json parties.json votes.json metrics.json parameters.json \
              | awk '{print $2 " " $1}' \
              | jq -Rn '[inputs | split(" ") | {(.[0]): .[1]}] | add'
          )

          jq -n \
            --arg dataVersion "$DATA_VERSION" \
            --arg sourceCommit "$GIT_SHA" \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg schemaVersion "1" \
            --argjson checksums "$CHECKSUMS_JSON" \
            '{
              dataVersion: $dataVersion,
              sourceCommit: $sourceCommit,
              generatedAt: $generatedAt,
              schemaVersion: $schemaVersion,
              checksums: $checksums
            }' > election-data/manifest.json

      - name: Zip static election data bundle
        run: (cd election-data && zip -r ../$DATA_ARTIFACT .)

      - name: Build artifact checksums
        run: |
          sha256sum "$ARTIFACT" > "$BINARY_CHECKSUM_ARTIFACT"
          sha256sum "$DATA_ARTIFACT" > "$DATA_CHECKSUM_ARTIFACT"

      - name: Upload workflow data artifact
        uses: actions/upload-artifact@v4
        with:
          name: election-data-bundle
          path: ${{ env.DATA_ARTIFACT }}
          if-no-files-found: error

      - name: Upload workflow checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: election-data-checksum
          path: ${{ env.DATA_CHECKSUM_ARTIFACT }}
          if-no-files-found: error

      - name: Upload workflow binary checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary-checksum
          path: ${{ env.BINARY_CHECKSUM_ARTIFACT }}
          if-no-files-found: error

      - name: Create / Update GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.BINARY_CHECKSUM_ARTIFACT }}
            ${{ env.DATA_ARTIFACT }}
            ${{ env.DATA_CHECKSUM_ARTIFACT }}
            election-data/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
